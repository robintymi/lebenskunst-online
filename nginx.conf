# Rate limiting zones
limit_req_zone $binary_remote_addr zone=checkout:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

# Redirect www to non-www
server {
    listen 80;
    server_name www.lebenskunstonline.de;
    return 301 https://lebenskunstonline.de$request_uri;
}

server {
    listen 443 ssl;
    server_name www.lebenskunstonline.de;

    ssl_certificate /etc/letsencrypt/live/lebenskunstonline.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lebenskunstonline.de/privkey.pem;

    return 301 https://lebenskunstonline.de$request_uri;
}

# HTTP — redirect to HTTPS + Let's Encrypt challenge
server {
    listen 80;
    server_name lebenskunstonline.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    server_name lebenskunstonline.de;

    ssl_certificate /etc/letsencrypt/live/lebenskunstonline.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lebenskunstonline.de/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com;" always;

    client_max_body_size 500M;

    # Rate limiting for checkout
    location /api/checkout {
        limit_req zone=checkout burst=3 nodelay;
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate limiting for login
    location /api/users/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhooks — no rate limiting, higher timeout
    location /api/webhooks/ {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Internal content delivery (protected by app, not directly accessible)
    location /internal-content/ {
        internal;
        alias /var/www/content/;
    }

    # Main app proxy
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
